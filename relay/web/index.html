<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#161b22">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CyberAgent">
  <title>CyberAgent</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/static/style.css">
  <!-- Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <span class="header-logo">CyberAgent</span>
    <span class="header-model"></span>
    <div class="header-status">
      <span class="status-dot"></span>
      <span id="status-text">conectando...</span>
      <button id="settings-btn" class="icon-btn header-icon-btn" title="Ajustes">set</button>
      <button id="logout-btn" title="Cerrar sesion" onclick="localStorage.removeItem('ca_history_' + location.host); fetch('/api/auth/logout',{method:'POST'}).then(()=>location.href='/login')">Salir</button>
    </div>
  </header>

  <div id="settings-backdrop" class="settings-backdrop"></div>
  <aside id="settings-panel" class="settings-panel" aria-label="Ajustes de sesion">
    <div class="settings-panel-header">
      <h2>Ajustes</h2>
      <button id="settings-close" class="icon-btn" title="Cerrar">x</button>
    </div>

    <label class="settings-field">
      <span>Modelo</span>
      <select id="model-select">
        <option value="">Auto</option>
        <option value="fast">Rapido</option>
        <option value="power">Potente</option>
      </select>
    </label>

    <label class="settings-toggle">
      <input type="checkbox" id="trust-toggle">
      <span>Auto-aprobar herramientas en esta sesion</span>
    </label>

    <section class="settings-section">
      <h3>Permisos por herramienta</h3>
      <div id="permissions-list" class="permissions-list"></div>
    </section>
  </aside>

  <!-- Messages -->
  <main id="messages"></main>

  <!-- Approval overlay (shown above input when tool needs approval) -->
  <div id="approval-overlay"></div>

  <!-- Input area -->
  <footer id="input-area">
    <!-- Attached image thumbnails -->
    <div id="attachments"></div>

    <div class="input-row">
      <!-- Left actions: camera, screen, voice -->
      <div class="input-actions">
        <button class="icon-btn" id="camera-btn" title="Adjuntar imagen / Camara">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
        <button class="icon-btn" id="screen-btn" title="Capturar pantalla">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
        </button>
        <button class="icon-btn" id="voice-btn" title="Voz">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8"  y1="23" x2="16" y2="23"/>
          </svg>
        </button>
      </div>

      <!-- Text input -->
      <textarea
        id="input"
        placeholder="Escribe un mensaje... (Enter envia, Shift+Enter salto de linea)"
        rows="1"
        autocomplete="off"
        autocorrect="off"
        spellcheck="true"
      ></textarea>

      <!-- Send / Stop -->
      <button id="send-btn" title="Enviar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
      <button id="stop-btn" title="Parar">Stop</button>
    </div>
  </footer>

</div>

<!-- PWA service worker -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
<script src="/static/app.js"></script>
</body>
</html>
