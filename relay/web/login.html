<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#161b22">
  <title>CyberAgent - Acceso</title>
  <link rel="stylesheet" href="/static/login.css">
</head>
<body>
<main class="shell">
  <section class="hero" aria-label="Estado de CyberAgent">
    <div class="brand-mark">CA</div>
    <div>
      <p class="eyebrow">Cloud Run relay</p>
      <h1>CyberAgent</h1>
      <p class="hero-copy">Entrada móvil al PC principal mediante relay seguro.</p>
    </div>
    <div class="status-grid">
      <div class="status-chip"><span></span> Cloud Run</div>
      <div class="status-chip"><span></span> PC relay</div>
      <div class="status-chip muted"><span></span> iPhone PWA</div>
    </div>
  </section>

  <section id="card" aria-label="Acceso">
  <div class="logo">CA</div>
  <h2>Entrar</h2>
  <p class="sub" id="card-sub">Codigo Authenticator para email fijo</p>

  <form id="code-form">
    <p class="notice">Abre Authenticator y usa el codigo de 6 digitos de CyberAgent Relay.</p>
    <label>Email autorizado</label>
    <div id="fixed-email" class="readonly-field">cargando...</div>
    <label>Dispositivo detectado</label>
    <div id="device-label" class="readonly-field">detectando...</div>
    <label>Codigo de 6 digitos</label>
    <input id="login-code" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="123456" autocomplete="one-time-code">
    <button type="submit" id="login-btn">Entrar</button>
    <p id="login-err" class="err hidden"></p>
  </form>
  </section>
</main>

<script>
let fixedEmail = '';
let deviceLabel = '';

async function post(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
    credentials: 'same-origin',
  });
  if (!r.ok && !r.headers.get('content-type')?.includes('application/json')) {
    throw new Error(`HTTP ${r.status}`);
  }
  return r.json();
}

function showErr(el, msg) {
  el.textContent = msg;
  el.classList.remove('hidden');
}

function detectDevice() {
  const ua = navigator.userAgent || '';
  const platform = /iphone|ipad/i.test(ua) ? 'iPhone/iPad'
    : /android/i.test(ua) ? 'Android'
    : /windows/i.test(ua) ? 'Windows'
    : /mac/i.test(ua) ? 'macOS'
    : 'Dispositivo web';
  return `${platform} · ${new Date().toLocaleString()}`;
}

async function init() {
  const res = await fetch('/api/auth/status').then(r => r.json());
  fixedEmail = res.email || '';
  deviceLabel = detectDevice();
  document.getElementById('fixed-email').textContent = fixedEmail || 'No configurado';
  document.getElementById('device-label').textContent = deviceLabel;
  document.getElementById('card-sub').textContent = 'Codigo Authenticator para email fijo';
}

document.getElementById('code-form').addEventListener('submit', async e => {
  e.preventDefault();
  const code = document.getElementById('login-code').value.trim();
  const err   = document.getElementById('login-err');
  err.classList.add('err');
  err.classList.remove('notice');
  if (code.length !== 6) return showErr(err, 'Introduce el codigo de 6 digitos');

  document.getElementById('login-btn').disabled = true;
  try {
    const res = await post('/api/auth/totp/verify', {
      code,
      device_label: deviceLabel,
      platform: navigator.platform || '',
    });
    if (res.ok) {
      window.location.href = '/';
    } else {
      showErr(err, res.error || 'Codigo incorrecto');
      document.getElementById('login-btn').disabled = false;
    }
  } catch(ex) {
    showErr(err, 'Error de conexion. Intenta de nuevo.');
    document.getElementById('login-btn').disabled = false;
  }
});

init();
</script>
</body>
</html>
