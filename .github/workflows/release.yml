name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Extract version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          Write-Host "Building version: $version"
          [System.IO.File]::WriteAllText("version.txt", $version)
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build CyberAgent.exe
        shell: pwsh
        run: pyinstaller CyberAgent.spec --noconfirm

      - name: Verify CyberAgent build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\CyberAgent\CyberAgent.exe")) {
            Write-Error "CyberAgent.exe not found — build failed"
            exit 1
          }
          Write-Host "✓ CyberAgent.exe built successfully"

      - name: Build CyberAgentInstaller.exe (onefile)
        shell: pwsh
        run: |
          Push-Location installer
          pyinstaller CyberAgentInstaller.spec --noconfirm
          Pop-Location

      - name: Verify Installer build
        shell: pwsh
        run: |
          if (-not (Test-Path "installer\dist\CyberAgentInstaller.exe")) {
            Write-Error "CyberAgentInstaller.exe not found — build failed"
            exit 1
          }
          $size = [math]::Round((Get-Item "installer\dist\CyberAgentInstaller.exe").Length / 1MB, 1)
          Write-Host "✓ CyberAgentInstaller.exe built ($size MB)"

      - name: Package artifacts
        shell: pwsh
        run: |
          $ver = "${{ env.VERSION }}"
          # Agente principal (directorio → zip)
          Compress-Archive -Path dist\CyberAgent -DestinationPath "CyberAgent-$ver-windows.zip"
          # Instalador: un solo exe, se publica directo
          Copy-Item "installer\dist\CyberAgentInstaller.exe" "CyberAgentInstaller-$ver.exe"
          Write-Host "✓ Packages ready"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CyberAgent v${{ env.VERSION }}"
          body: |
            ## CyberAgent v${{ env.VERSION }}

            ### Instalación
            1. Descarga **`CyberAgentInstaller-${{ env.VERSION }}.exe`** — un solo archivo
            2. Ejecútalo (pide permisos de administrador automáticamente)
            3. El instalador descarga e instala CyberAgent, configura Ollama y crea el acceso directo

            ### Actualización automática
            La app detecta nuevas versiones en cada arranque y actualiza con un clic desde la bandeja del sistema.

            ### Requisitos
            - Windows 10/11 x64
            - Sin dependencias adicionales — el instalador lo gestiona todo

          files: |
            CyberAgent-${{ env.VERSION }}-windows.zip
            CyberAgentInstaller-${{ env.VERSION }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
